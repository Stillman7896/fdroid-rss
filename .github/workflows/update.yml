name: Update RSS Feeds

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Generate RSS feeds and update README
        run: |
          python generate_rss.py
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # Generate the new list items (without markers)
          echo "<!-- AUTO-GENERATED LIST START -->" > new_block.txt
          while read pkg; do
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            GITHUB_PAGES="https://${{ github.repository_owner }}.github.io/$REPO_NAME/feeds/$pkg.xml"
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/feeds/$pkg.xml"
            SOURCE_URL="https://github.com/${{ github.repository }}/blob/main/feeds/$pkg.xml"
            echo "- [$pkg]($GITHUB_PAGES) ([raw]($RAW_URL), [source]($SOURCE_URL))" >> new_block.txt
          done < packages.txt
          echo "<!-- AUTO-GENERATED LIST END -->" >> new_block.txt

          # Replace the block in README.md using Python
          python -c "
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          with open('new_block.txt', 'r') as f:
              new_block = f.read().rstrip('\n')
          # Match the whole block including START and END markers
          pattern = r'(<!-- AUTO-GENERATED LIST START -->).*?(<!-- AUTO-GENERATED LIST END -->)'
          # Replace with the new block (which already contains the markers)
          new_content = re.sub(pattern, new_block, content, flags=re.DOTALL)
          with open('README.md', 'w') as f:
              f.write(new_content)
          "

          rm new_block.txt

          git add feeds/ README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update RSS feeds and package list"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
         path: ./feeds

  deploy:
    needs: update
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
